<div class="container-fluid text-center m-0 p-1">

    <div class="row g-0 d-none" id="morezoom">
        <div class="col p-1 m-0">
            <i class="fa-solid fa-computer-mouse"></i><span glot-model="morezoom" class="ms-2"></span>
        </div>
    </div>

    <div class="row g-0" id="makeMap">
        <div class="col p-1 m-0">
            <button class="btn btn-light w-100" onclick="mapMaker.make(Basic.getdate())">
                <i class="fas fa-map me-2"></i><span glot-model="makemap" class="ms-2"></span>
            </button>
        </div>
    </div>

    <div class="row g-0 mb-2" id="clearMap">
        <button class="btn btn-light w-100" onclick="mapMaker.clearAll()">
            <i class="fas fa-undo me-2"></i> <span glot-model="restart_title"></span>
        </button>
    </div>

    <div id="saveMap">
        <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-2 mt-2">
            <button class="btn btn-light flex-fill" onclick="mapMaker.save('png');">
                <i class="fas fa-file-download me-2 flex-row"></i><span>PNG</span>
            </button>
            <button class="btn btn-light flex-fill" onclick="mapMaker.save('svg');">
                <i class="fas fa-file-download me-2 flex-row"></i><span>SVG</span>
            </button>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-lg-3 gy-3 gx-0 mt-0" id="controlMenu">

        <div class="col-3 p-1 m-0">
            <button class="btn btn-light dropdown-toggle w-100" id="AreaSelect1" data-bs-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false"><i class="fas fa-vector-square"></i>
            </button>
            <div class="dropdown-menu" aria-labelledby="AreaSelect1">
                <span class="dropdown-item btn ps-1 me-1" onclick="mapMaker.area_select('A4')"><i
                        class="fas fa-arrows-alt-v ms-1 pe-1 ms-2"></i><span glot-model="area_A4"
                        class="ms-2"></span></span>
                <span class="dropdown-item btn ps-1 me-1" onclick="mapMaker.area_select('A4_landscape')"><i
                        class="fas fa-arrows-alt-h ms-2"></i><span glot-model="area_A4_landscape"
                        class="ms-2"></span></span>
                <span class="dropdown-item btn ps-1 me-1" onclick="mapMaker.area_select('A3')"><i
                        class="fas fa-arrows-alt-v ms-1 pe-1 ms-2"></i><span glot-model="area_A3"
                        class="ms-2"></span></span>
                <span class="dropdown-item btn ps-1 me-1" onclick="mapMaker.area_select('A3_landscape')"><i
                        class="fas fa-arrows-alt-h ms-2"></i><span glot-model="area_A3_landscape"
                        class="ms-2"></span></span>
                <span class="dropdown-item btn ps-1 me-1" onclick="mapMaker.area_select('')"><i
                        class="fas fa-vector-square ms-2"></i><span glot-model="area_deselect"
                        class="ms-2"></span></span>
            </div>
        </div>

        <div class="col-3 p-1 m-0" id="editMenu">
            <button class="btn btn-light dropdown-toggle w-100" id="dropdownMenuButton" data-bs-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false">
                <i class="fas fa-map-marker"></i>
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton" id="menu_list"></div>
        </div>

        <div class="col-3 p-1 m-0" id="colorMenu">
            <button class="btn btn-light dropdown-toggle w-100" id="ColorSelect" data-bs-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false">
                <i class="fas fa-palette"></i>
            </button>
            <div class="dropdown-menu" aria-labelledby="ColorSelect">
                <span class="dropdown-item btn ps-1 me-1" onclick="LayerCont.setStyle('color')">
                    <i class="fas fa-swatchbook ms-2 me-1"></i>
                    <span glot-model="color_palette"></span></span>
                <span class="dropdown-item btn ps-1 me-1" onclick="LayerCont.setStyle('mono')">
                    <i class="fas fa-swatchbook ms-2 me-1"></i>
                    <span glot-model="mono_palette"></span></span>
            </div>
        </div>
    </div>

    <div class="row g-0 mt-2" id="customMap">
        <fieldset id="AAA" class="d-none">
            <div class="col border-0 border-bottom">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="customName"></span>
                    <button id="AAA_layer" class="del_button me-1">
                        <i class="fas fa-trash-alt me-1"></i></button>
                    <input type="button" id="AAA_color">
                    <input type="number" id="AAA_line" class="line_text" max="60" min="0" step="0.1">
                </div>
        </fieldset>
    </div>

</div>
